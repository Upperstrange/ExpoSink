workflows:
  build-dev-client:
    name: Build Dev Client
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      vars:
        BUNDLE_ID: "com.tekibo.exposink"
        PATH: $PATH:$HOME/.bun/bin
        # Force llama.rn and Worklets to compile clean for the M2 architecture
        RNLLAMA_BUILD_FROM_SOURCE: 1
    scripts:
      - name: 📥 Setup Bun
        script: |
          curl -fsSL https://bun.sh/install | bash
          echo "export PATH=\"\$HOME/.bun/bin:\$PATH\"" >> $CM_ENV

      - name: 📦 Install Dependencies
        script: |
          bun install --frozen-lockfile

      - name: ⚙️ Expo prebuild
        script: |
          bunx expo prebuild --platform ios --clean

      - name: 🛠 Fix Podfile for Unsigned Build
        script: |
          cd ios
          # This appends a specialized post_install hook to force all Pods to skip signing
          # while maintaining the C++20 standard across all native modules.
          cat <<EOF >> Podfile

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['\$(inherited)', 'FORCE_CXX20=1']
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['AD_HOC_CODE_SIGNING_ALLOWED'] = 'YES'
              end
            end
          end
          EOF

      - name: 📦 Install CocoaPods
        script: |
          cd ios
          pod repo update
          pod install

      - name: 🏗 Build unsigned iOS dev client
        script: |
          cd ios
          # AD_HOC_CODE_SIGNING_ALLOWED=YES is the secret key to fixing Libtool failures.
          # COMPILER_INDEX_STORE_ENABLE=NO prevents the build from hanging on heavy C++ files.
          xcodebuild \
            -workspace exposink.xcworkspace \
            -scheme exposink \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CLANG_CXX_LANGUAGE_STANDARD="c++20" \
            CLANG_CXX_LIBRARY="libc++" \
            OTHER_CPLUSPLUSFLAGS="-DFORCE_CXX20" \
            build | tee build.log

      - name: 📦 Create unsigned IPA
        script: |
          cd ios
          APP="build/Build/Products/Debug-iphoneos/exposink.app"

          if [ ! -d "$APP" ]; then
            echo "❌ Error: .app bundle not found at $APP. Check build.log for details."
            exit 1
          fi

          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry exposink-dev-client.ipa Payload
          mv exposink-dev-client.ipa $CM_EXPORT_DIR

    artifacts:
      - $CM_EXPORT_DIR/*.ipa
    publishing:
      email:
        recipients:
          - abhijit@tekibo.in
