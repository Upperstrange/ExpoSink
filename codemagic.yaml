workflows:
  build-dev-client:
    name: Build Dev Client
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest # Will resolve to Xcode 26.x in April 2026
      vars:
        BUNDLE_ID: "com.tekibo.exposink"
        PATH: $PATH:$HOME/.bun/bin
        # Force llama.rn to build from source to match the current arch/SDK
        RNLLAMA_BUILD_FROM_SOURCE: 1
    scripts:
      - name: 📥 Setup Bun
        script: |
          curl -fsSL https://bun.sh/install | bash
          echo "export PATH=\"\$HOME/.bun/bin:\$PATH\"" >> $CM_ENV

      - name: 📦 Install Dependencies
        script: |
          bun install --frozen-lockfile

      - name: ⚙️ Expo prebuild
        script: |
          bunx expo prebuild --platform ios --clean

      - name: 📦 Install CocoaPods
        script: |
          cd ios
          # Ensure repo is up to date for new SDK 55 dependencies
          pod repo update
          pod install

      - name: 🏗 Build unsigned iOS dev client
        script: |
          cd ios
          # Force C++20 standard for llama.rn/JSI compatibility
          xcodebuild \
            -workspace exposink.xcworkspace \
            -scheme exposink \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CLANG_CXX_LANGUAGE_STANDARD="c++20" \
            CLANG_CXX_LIBRARY="libc++" \
            OTHER_CPLUSPLUSFLAGS="-DFORCE_CXX20" \
            build

      - name: 📦 Create unsigned IPA
        script: |
          cd ios
          APP="build/Build/Products/Debug-iphoneos/exposink.app"

          if [ ! -d "$APP" ]; then
            echo "Error: .app bundle not found at $APP"
            exit 1
          fi

          mkdir Payload
          cp -R "$APP" Payload/
          zip -qry exposink-dev-client.ipa Payload
          mv exposink-dev-client.ipa $CM_EXPORT_DIR

    artifacts:
      - $CM_EXPORT_DIR/*.ipa
    publishing:
      email:
        recipients:
          - abhijit@tekibo.in
